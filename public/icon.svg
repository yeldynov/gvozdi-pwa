<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background tile (rounded-square, iOS icon safe area) -->
  <rect width="512" height="512" rx="114" fill="#f7f5f0"/>

  <!-- Nail board: 6×6 grid of dots, centered -->
  <g fill="#1a1815" opacity="0.18">
    <circle cx="166" cy="166" r="8"/><circle cx="220" cy="166" r="8"/><circle cx="274" cy="166" r="8"/>
    <circle cx="328" cy="166" r="8"/><circle cx="382" cy="166" r="8"/>
    <circle cx="130" cy="220" r="8"/><circle cx="184" cy="220" r="8"/><circle cx="238" cy="220" r="8"/>
    <circle cx="292" cy="220" r="8"/><circle cx="346" cy="220" r="8"/><circle cx="400" cy="220" r="8"/>
    <circle cx="130" cy="274" r="8"/><circle cx="184" cy="274" r="8"/>
    <circle cx="328" cy="274" r="8"/><circle cx="382" cy="274" r="8"/>
    <circle cx="130" cy="328" r="8"/><circle cx="184" cy="328" r="8"/><circle cx="238" cy="328" r="8"/>
    <circle cx="292" cy="328" r="8"/><circle cx="346" cy="328" r="8"/><circle cx="400" cy="328" r="8"/>
    <circle cx="166" cy="382" r="8"/><circle cx="220" cy="382" r="8"/><circle cx="274" cy="382" r="8"/>
    <circle cx="328" cy="382" r="8"/><circle cx="382" cy="382" r="8"/>
  </g>

  <!-- Logo mark: circle + center dot -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#1a1815" stroke-width="9"/>
  <circle cx="256" cy="256" r="16" fill="#1a1815"/>
</svg>
